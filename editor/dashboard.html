<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - JSON Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-brand">
                <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/>
                </svg>
                <h1 class="brand-title">JSON Editor</h1>
            </div>
            <div class="header-nav">
                <button id="navDashboard" class="nav-btn active">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"/>
                        <rect x="14" y="3" width="7" height="7"/>
                        <rect x="14" y="14" width="7" height="7"/>
                        <rect x="3" y="14" width="7" height="7"/>
                    </svg>
                    Dashboard
                </button>
                <button id="navEditor" class="nav-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <path d="M14 2v6h6"/>
                        <line x1="12" y1="18" x2="12" y2="12"/>
                        <line x1="9" y1="15" x2="15" y2="15"/>
                    </svg>
                    Editor
                </button>
            </div>
            <div class="header-meta">
                <span class="meta-label">JSON DATA TOOL</span>
                <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">
                    <span class="theme-icons">
                        <svg class="sun-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="5"/>
                            <line x1="12" y1="1" x2="12" y2="3"/>
                            <line x1="12" y1="21" x2="12" y2="23"/>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                            <line x1="1" y1="12" x2="3" y2="12"/>
                            <line x1="21" y1="12" x2="23" y2="12"/>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                        </svg>
                        <svg class="moon-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                        </svg>
                    </span>
                </button>
            </div>
        </header>

        <!-- Dashboard View -->
        <div class="app-body">
            <div id="dashboardView" class="dashboard-view active">
                <!-- Dashboard Sidebar -->
                <aside class="dashboard-sidebar">
                    <div class="sidebar-section">
                        <h3 class="sidebar-section-title">Region</h3>
                        <div class="region-selector">
                            <label class="region-option">
                                <input type="radio" name="region" value="NAM" checked>
                                <span class="region-label">NAM</span>
                            </label>
                            <label class="region-option">
                                <input type="radio" name="region" value="EMEA">
                                <span class="region-label">EMEA</span>
                            </label>
                            <label class="region-option">
                                <input type="radio" name="region" value="APAC">
                                <span class="region-label">APAC</span>
                            </label>
                        </div>
                    </div>
                </aside>

                <!-- Main Dashboard Content -->
                <main class="dashboard-main">
                    <div class="dashboard-header">
                        <div class="dashboard-title">
                            <h2>Files</h2>
                            <span class="subtitle">Manage your JSON files</span>
                        </div>
                        <div class="dashboard-controls">
                            <div class="search-box">
                                <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="11" cy="11" r="8"/>
                                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                                </svg>
                                <input type="text" id="fileSearch" placeholder="Search files..." class="search-input">
                            </div>
                            <select id="sortSelect" class="sort-select">
                                <option value="modified">Last Modified</option>
                                <option value="name">Name</option>
                                <option value="size">Size</option>
                            </select>
                        </div>
                    </div>

                    <div id="filesTable" class="files-table">
                        <!-- Table will be populated by JS -->
                    </div>
                </main>
            </div>
        </div>
    </div>

    <!-- Tag Edit Modal -->
    <div id="tagModal" class="modal-overlay">
        <div class="modal-container modal-small">
            <div class="modal-header">
                <h2 class="modal-title">Edit Tags</h2>
                <button class="modal-close" id="closeTagModal">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="tag-input-group">
                    <label>Add Tags</label>
                    <div class="tag-input-wrapper">
                        <div id="tagList" class="tag-list-edit"></div>
                        <input type="text" id="tagInput" placeholder="Type and press Enter..." class="tag-input">
                    </div>
                    <p class="tag-hint">Press Enter or comma to add a tag</p>
                </div>
            </div>
            <div class="form-actions">
                <button type="button" class="btn btn-secondary" id="cancelTagBtn">Cancel</button>
                <button type="button" class="btn btn-success" id="saveTagBtn">Save Tags</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast">
        <span class="toast-message"></span>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
